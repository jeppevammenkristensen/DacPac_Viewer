name: Build and Release Installer

on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: ubuntu-latest
            runtime: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Velopack CLI
        run: |
          dotnet tool install -g vpk
          "$HOME/.dotnet/tools" >> $env:GITHUB_PATH

      - name: Read version from csproj
        id: version
        run: |
          [xml]$csproj = Get-Content "source/DacPac.UI/DacPac.UI.csproj"
          $versionPrefix = $csproj.Project.PropertyGroup.VersionPrefix | Where-Object { $_ } | Select-Object -First 1
          $versionSuffix = $csproj.Project.PropertyGroup.VersionSuffix | Where-Object { $_ } | Select-Object -First 1
          if (-not $versionPrefix) {
            Write-Error "Could not find <VersionPrefix> in DacPac.UI.csproj"
          }
          $version = if ($versionSuffix) { "$versionPrefix-$versionSuffix" } else { $versionPrefix }
          Write-Host "Building version $version"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build and upload installer
        run: |
          ./build-installer.ps1 -Version "${{ steps.version.outputs.version }}" -Runtime "${{ matrix.runtime }}" -UploadToGitHub -GitHubToken "${{ secrets.GITHUB_TOKEN }}"
