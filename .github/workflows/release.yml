name: Build and Release Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install MinVer CLI
        run: dotnet tool install -g minver-cli

      - name: Compute version
        id: version
        run: |
          $version = minver -t v
          Write-Host "Building version $version"
          "version=$version" >> $env:GITHUB_OUTPUT

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: ubuntu-latest
            runtime: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install Velopack CLI
        run: |
          dotnet tool install -g vpk
          "$HOME/.dotnet/tools" >> $env:GITHUB_PATH

      # Note: intentionally not uploading here. Both matrix legs would race to
      # create/write the same GitHub Release (same tag) in parallel, and
      # whichever leg loses the race fails with "vpk upload failed". Instead,
      # each leg publishes its installer as a build artifact, and a single
      # downstream job uploads both platforms' files together.
      - name: Build installer
        run: |
          ./build-installer.ps1 -Version "${{ needs.version.outputs.version }}" -Runtime "${{ matrix.runtime }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: installer-${{ matrix.runtime }}
          path: releases

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install Velopack CLI
        run: |
          dotnet tool install -g vpk
          "$HOME/.dotnet/tools" >> $env:GITHUB_PATH

      - name: Download installer artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: installer-*
          path: releases
          merge-multiple: true

      # vpk upload only handles one channel per invocation (it defaults to the
      # channel of the OS it runs on, which is why only linux assets were
      # uploaded before). Upload each platform's channel explicitly, with
      # --merge so they land in the same GitHub release.
      #
      # A prerelease version (e.g. "1.2.3-beta.1", from a "vX.Y.Z-beta-N" tag)
      # is published straight away as a GitHub prerelease so beta opt-in users
      # pick it up immediately. Stable versions still land as a draft release
      # for manual review/publish.
      - name: Upload release to GitHub
        run: |
          $isBeta = "${{ needs.version.outputs.version }}" -match '-'
          foreach ($channel in @("win", "linux")) {
            Write-Host "Uploading channel $channel..." -ForegroundColor Cyan
            $vpkArgs = @(
              "upload", "github",
              "--repoUrl", "https://github.com/jeppevammenkristensen/DacPac_Viewer",
              "--token", "${{ secrets.GITHUB_TOKEN }}",
              "--releaseName", "DacPac Viewer ${{ needs.version.outputs.version }}",
              "--tag", "v${{ needs.version.outputs.version }}",
              "--channel", $channel,
              "--merge",
              "--outputDir", "releases"
            )
            if ($isBeta) {
              $vpkArgs += @("--publish", "--pre")
            }
            vpk @vpkArgs
            if ($LASTEXITCODE -ne 0) { Write-Error "vpk upload failed for channel $channel." }
          }
